<div class="video-table">
  <table mat-table [dataSource]="dataSource" multiTemplateDataRows>

    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef> Title </th>
      <td mat-cell *matCellDef="let element"> {{element.title}} </td>
    </ng-container>

    <ng-container matColumnDef="length">
      <th mat-header-cell *matHeaderCellDef> Length </th>
      <td mat-cell *matCellDef="let element"> {{convertSecondsToMinutes(element.length)}} </td>
    </ng-container>

    <ng-container matColumnDef="expandedDescription">
      <td mat-cell *matCellDef="let element" [attr.colspan]="displayedColumns.length">
        <div class="element-detail"
             [@descriptionExpand]="element == expandedElement ? 'expanded' : 'collapsed'">
          <div *ngIf="element.description">Description about the video:</div>
          <div class="element-description">
            {{element.description}}
          </div>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let element; columns: displayedColumns;"
        class="element-row"
        [class.expanded-row]="expandedElement === element"
        (click)="expandedElement = expandedElement === element ? null : element; selected.emit(element);$event.stopImmediatePropagation">
    </tr>
    <tr mat-row *matRowDef="let row; columns: ['expandedDescription']" class="detail-row"></tr>
  </table>
</div>
